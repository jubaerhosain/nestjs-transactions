name: Release

on:
  push:
    branches: [main]

concurrency: release-${{ github.ref }}

permissions:
  contents: write # push version PR commits & tags
  pull-requests: write # open the "Version Packages" PR
  id-token: write # npm trusted publishing (OIDC) — no NPM_TOKEN needed

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # Self-contained safety gate: fail before versioning/publishing even if
      # something reached main without the required PR checks.
      - run: pnpm -r build
      - run: pnpm -r test:unit
      - uses: changesets/action@v1
        with:
          # pnpm (not npm/changesets) must publish: it rewrites workspace:^ at pack time
          publish: pnpm ci:publish
          commit: 'chore: version packages'
          title: 'chore: version packages'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
